<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenyuko | Admin - Tạo Key</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #6366f1;
            --secondary: #4f46e5;
            --success: #10b981;
            --bg: #0f172a;
            --card-bg: #ffffff;
            --text-main: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f8fafc;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 450px;
            color: var(--text-main);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        h2 { text-align: center; margin-bottom: 25px; color: var(--secondary); font-weight: 800; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: #64748b; }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4); }

        #admin-panel { display: none; }

        .status-msg {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }

        .success { background: #dcfce7; color: #166534; display: block; }
        .error { background: #fee2e2; color: #991b1b; display: block; }

        .key-list {
            margin-top: 20px;
            max-height: 150px;
            overflow-y: auto;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.8rem;
            display: none;
        }
    </style>
</head>
<body>

    <div id="login-section" class="container">
        <h2><i class="fas fa-lock"></i> Kenyuko Admin</h2>
        <div class="form-group">
            <label>Mật khẩu hệ thống</label>
            <input type="password" id="admin-pass" placeholder="Nhập mật khẩu để truy cập">
        </div>
        <button class="btn" onclick="checkAuth()">XÁC THỰC</button>
        <p id="login-err" style="color:red; text-align:center; margin-top:10px; font-size: 0.8rem;"></p>
    </div>

    <div id="admin-panel" class="container">
        <h2><i class="fas fa-plus-circle"></i> Trình tạo Key</h2>
        
        <div class="form-group">
            <label>Số lượng Key muốn tạo</label>
            <input type="number" id="key-qty" min="1" step="1" oninput="this.value=this.value.replace(/[^0-9]/g,'');" placeholder="Ví dụ: 5">
        </div>

        <div class="form-group">
            <label>Số lần sử dụng mỗi Key</label>
            <input type="number" id="key-usage" min="1" step="1" oninput="this.value=this.value.replace(/[^0-9]/g,'');" placeholder="Ví dụ: 100">
        </div>

        <button class="btn" onclick="generateKeys()"><i class="fas fa-magic"></i> TẠO KEY NGAY</button>
        
        <div id="status" class="status-msg"></div>
        <div id="result-list" class="key-list"></div>
    </div>

    <script>
        // Cấu hình Firebase của bạn
        const firebaseConfig = {
            databaseURL: "https://realtime-database-bee52-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Mật khẩu Admin (Bạn có thể đổi ở đây)
        const MASTER_PASS = "admin123"; 

        function checkAuth() {
            const pass = document.getElementById('admin-pass').value;
            if(pass === MASTER_PASS) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
            } else {
                document.getElementById('login-err').innerText = "Mật khẩu không chính xác!";
            }
        }

        function makeRandomKey(length) {
            let result = '';
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            for (let i = 0; i < length; i++) {
                result += characters.charAt(Math.floor(Math.random() * characters.length));
            }
            return result;
        }

        async function generateKeys() {
            const qty = parseInt(document.getElementById('key-qty').value);
            const usage = parseInt(document.getElementById('key-usage').value);
            const statusDiv = document.getElementById('status');
            const resultDiv = document.getElementById('result-list');

            if(!qty || !usage || qty <= 0 || usage <= 0) {
                statusDiv.innerText = "Vui lòng nhập số nguyên dương hợp lệ!";
                statusDiv.className = "status-msg error";
                return;
            }

            statusDiv.innerText = "Đang khởi tạo...";
            statusDiv.className = "status-msg success";
            resultDiv.innerHTML = "";
            let createdKeys = [];

            try {
                for(let i = 0; i < qty; i++) {
                    const newKey = "KEY-" + makeRandomKey(8);
                    await db.ref('keys/' + newKey).set({
                        usage: usage,
                        createdAt: new Date().toISOString()
                    });
                    createdKeys.push(newKey);
                }

                statusDiv.innerText = `Thành công! Đã tạo ${qty} key.`;
                resultDiv.style.display = "block";
                resultDiv.innerHTML = "<strong>Danh sách key mới:</strong><br>" + createdKeys.join("<br>");
            } catch (error) {
                statusDiv.innerText = "Lỗi Firebase: " + error.message;
                statusDiv.className = "status-msg error";
            }
        }
    </script>
</body>
</html>
